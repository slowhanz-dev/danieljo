<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Jo — Ceramic Product Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #fff; color: #000;
  font-family: 'Pretendard', -apple-system, sans-serif;
  height: 100vh; display: flex; flex-direction: column;
  justify-content: space-between; padding: 40px 52px;
  -webkit-font-smoothing: antialiased;
}
.logo {
  font-family: 'Jost', sans-serif;
  font-size: 15px; font-weight: 400;
  letter-spacing: .18em; text-transform: uppercase;
  color: #000; text-decoration: none;
  opacity: 0; animation: up .8s .1s forwards;
}
.center {
  display: flex; flex-direction: column; gap: 32px;
  opacity: 0; animation: up .8s .4s forwards;
}
.line { width: 40px; height: 1px; background: #000; }
.message {
  font-size: clamp(28px, 4vw, 52px);
  font-weight: 200; line-height: 1.25; letter-spacing: -.01em;
}
.footer {
  display: flex; justify-content: space-between; align-items: flex-end;
  opacity: 0; animation: up .8s .7s forwards;
}
.contact { font-size: 13px; font-weight: 300; color: #999; letter-spacing: .04em; }
.contact a {
  color: #000; text-decoration: none;
  border-bottom: 1px solid #000; padding-bottom: 1px; transition: opacity .2s;
}
.contact a:hover { opacity: .4; }
.copy { font-size: 11px; font-weight: 300; color: #ccc; letter-spacing: .08em; }
@keyframes up {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (max-width: 600px) {
  body { padding: 28px 24px; }
  .footer { flex-direction: column; align-items: flex-start; gap: 12px; }
}
</style>
</head>
<body>
<a href="/" class="logo">Daniel Jo</a>
<div class="center">
  <div class="line"></div>
  <p class="message">A new site is<br>on its way.</p>
</div>
<div class="footer">
  <p class="contact"><a href="mailto:info@danieljo.com">info@danieljo.com</a></p>
  <p class="copy">© 2025 Daniel Jo</p>
</div>
</body>
</html>
